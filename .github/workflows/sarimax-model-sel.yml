name: SARIMAX model selection
 
# Manual-only: trigger from the Actions tab. Runs sarimax/run_states.R, which
# wraps sarimax/src/model_sel.r, and commits the updated results/ files back
# to the branch the workflow was run on.
on:
  workflow_dispatch:
    inputs:
      states:
        description: 'Comma-separated state codes (e.g. MG,SP), or "all"'
        required: false
        default: 'all'
      reset_checkpoint:
        description: 'Only used when states=all: clear concluded_states.csv first so every state reruns'
        required: false
        default: 'true'
        type: boolean
      npaths:
        description: 'Bootstrap forecast paths (lower = faster, coarser intervals)'
        required: false
        default: '1000'
 
permissions:
  contents: write
 
concurrency:
  group: sarimax-model-sel
  cancel-in-progress: false
 
jobs:
  run-model-selection:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6h -- the max for a single GitHub-hosted job
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
 
      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::forecast
            any::dplyr
            any::tidyr
            any::purrr
            any::lubridate
            any::readr
            any::scoringutils
            any::pbapply
          needs: NULL
 
      - name: Run model selection
        env:
          STATES: ${{ inputs.states }}
          RESET_CHECKPOINT: ${{ inputs.reset_checkpoint }}
          NPATHS: ${{ inputs.npaths }}
        run: Rscript sarimax/run_states.R
 
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sarimax/results/
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "sarimax: update model selection results (states=${{ inputs.states }})"
            git push
          fi
 
